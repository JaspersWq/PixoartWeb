<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixoart — Pixel Art Studio</title>
    <link rel="shortcut icon" href="LOGOpixel.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --teal: #3ECFB2;
            --amber: #F2B950;
            --coral: #E8644A;
            --dark: #0F1117;
            --mid: #1A1D27;
        }

        body {
            background: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
        }

        .pixel-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .pixel-bg canvas { width: 100%; height: 100%; }

        .center {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .logo-wrap {
            opacity: 0;
            transform: scale(0.4) rotate(-15deg);
            animation: logoIn 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
        }

        .logo-wrap img {
            width: 110px;
            filter: drop-shadow(0 0 30px rgba(62,207,178,0.6));
        }

        .title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(3rem, 8vw, 5.5rem);
            letter-spacing: -2px;
            line-height: 1;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.7s ease 0.8s forwards;
        }

        .title .t1 { color: var(--teal); }
        .title .t2 { color: white; }
        .title .t3 { color: var(--amber); }

        .tagline {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            animation: slideUp 0.7s ease 1.1s forwards;
        }

        .dots {
            display: flex;
            gap: 10px;
            opacity: 0;
            animation: fadeIn 0.5s ease 1.5s forwards;
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 2px;
            animation: blink 1.2s infinite;
        }
        .dot:nth-child(1) { background: var(--teal); animation-delay: 0s; }
        .dot:nth-child(2) { background: var(--amber); animation-delay: 0.2s; }
        .dot:nth-child(3) { background: var(--coral); animation-delay: 0.4s; }

        .version {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 0.5s ease 1.8s forwards;
        }

        @keyframes logoIn {
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes blink {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: scale(1.05); }
        }
        .exit { animation: fadeOut 0.6s ease forwards; }
    </style>
</head>
<body>
    <canvas class="pixel-bg" id="bgCanvas"></canvas>

    <div class="center" id="center">
        <div class="logo-wrap"><img src="LOGOpixel.png" alt="Pixoart"></div>
        <div class="title">
            <span class="t1">Pix</span><span class="t2">o</span><span class="t3">art</span>
        </div>
        <div class="tagline">Pixel Art Studio for Game Developers</div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="version">v2.0 — STUDIO EDITION</div>
    </div>

    <script>
        // Animated pixel grid background
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let W, H, cells = [];

        const COLORS = ['#3ECFB2','#F2B950','#E8644A','#667eea','#1A1D27','#0F1117'];
        const CELL = 28;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cells = [];
            for (let x = 0; x < W; x += CELL) {
                for (let y = 0; y < H; y += CELL) {
                    if (Math.random() > 0.85) {
                        cells.push({
                            x, y,
                            color: COLORS[Math.floor(Math.random() * COLORS.length)],
                            alpha: Math.random() * 0.15,
                            targetAlpha: Math.random() * 0.15,
                            speed: 0.002 + Math.random() * 0.008
                        });
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            cells.forEach(c => {
                c.alpha += (c.targetAlpha - c.alpha) * c.speed;
                if (Math.abs(c.alpha - c.targetAlpha) < 0.001) {
                    c.targetAlpha = Math.random() * 0.18;
                }
                ctx.fillStyle = c.color;
                ctx.globalAlpha = c.alpha;
                ctx.fillRect(c.x, c.y, CELL - 2, CELL - 2);
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }

        resize();
        draw();
        window.addEventListener('resize', resize);

        // Navigate after animation
        setTimeout(() => {
            document.getElementById('center').classList.add('exit');
            setTimeout(() => { window.location.href = 'anasayfa.html'; }, 600);
        }, 3800);
    </script>
</body>
</html>
